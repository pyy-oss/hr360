name: Deploy Neurones HR 360
on:
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - name: Install (front)
        run: npm ci
      - name: Install (functions)
        run: cd functions && npm ci
      - name: Type-check & build
        # La config Firebase WEB doit être présente à la COMPILATION : Vite fige les
        # VITE_* dans le bundle. Ces valeurs sont publiques (présentes dans tout bundle
        # client) ; seule l'apiKey est externalisée (les scanners de secrets détectent
        # les clés « AIzaSy… »), acceptée comme Variable OU Secret de dépôt.
        env:
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY || secrets.VITE_FIREBASE_API_KEY }}
        run: |
          export VITE_FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID"
          export VITE_FIREBASE_AUTH_DOMAIN="${FIREBASE_PROJECT_ID}.firebaseapp.com"
          export VITE_FIREBASE_STORAGE_BUCKET="hr360.firebasestorage.app"
          export VITE_FIREBASE_MESSAGING_SENDER_ID="38070203160"
          export VITE_FIREBASE_APP_ID="1:38070203160:web:4e199af7ab660b67f0646d"
          export VITE_FIREBASE_DB_ID="hr360"
          export VITE_FIREBASE_REGION="europe-west1"
          export VITE_USE_EMULATORS="false"
          npm run build
          cd functions && npm run build
      - name: Test (Vitest + emulator rules & functions)
        run: |
          npm run test:rules
          npm run test:functions
      - name: Deploy
        # Projet Firebase PARTAGÉ : on ne déploie QUE les ressources hr360 (codebase de
        # fonctions isolé + base/site/bucket dédiés déclarés dans firebase.json), afin de
        # ne jamais écraser l'autre application du projet.
        # Authentification par COMPTE DE SERVICE (clé JSON) via Application Default
        # Credentials — méthode pérenne (le --token de firebase login:ci est déprécié).
        #   - Secret de dépôt FIREBASE_SERVICE_ACCOUNT = contenu JSON de la clé (jamais commité).
        #   - FIREBASE_PROJECT_ID = id du projet, accepté comme Variable OU Secret de dépôt.
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          npx firebase-tools deploy \
            --only "hosting,firestore,functions:hr360,storage" \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive
          rm -f "$RUNNER_TEMP/sa.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          # Accepté indifféremment comme Variable de dépôt ou Secret de dépôt.
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID }}
